name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Test (coverage >= 90%)
        run: ./scripts/check-coverage.sh
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Lint
        run: make lint
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Lint workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - name: Deadcode
        run: |
          output_file=$(mktemp)
          go run golang.org/x/tools/cmd/deadcode@v0.47.0 -test ./... > "$output_file"
          if [ -s "$output_file" ]; then
            cat "$output_file"
            exit 1
          fi
      - name: Security scan
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.15.4
          args: check --config .goreleaser.yml
