version: 2

project_name: goplaces

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

builds:
  - id: goplaces
    main: ./cmd/goplaces
    binary: goplaces
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    flags:
      - -trimpath
    targets:
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
    ldflags:
      - -s -w -X github.com/steipete/goplaces/internal/cli.Version={{.Version}}
  - id: goplaces_darwin
    main: ./cmd/goplaces
    binary: goplaces
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    flags:
      - -trimpath
    targets:
      - darwin_amd64
      - darwin_arm64
    ldflags:
      - -s -w -X github.com/steipete/goplaces/internal/cli.Version={{.Version}}
    hooks:
      post:
        - ./scripts/codesign-macos.sh "{{ .Path }}" "{{ .IsSnapshot }}"

archives:
  - ids:
      - goplaces
      - goplaces_darwin
    files:
      - none*
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  draft: true
  target_commitish: "{{ .Commit }}"

snapshot:
  version_template: '{{ if index .Env "GOPLACES_PILOT_VERSION" }}{{ index .Env "GOPLACES_PILOT_VERSION" }}{{ else }}{{ .Version }}-snapshot{{ end }}'
